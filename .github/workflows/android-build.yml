name: Android Build & Play Console

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'capacitor.config.ts'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:
    inputs:
      upload_track:
        description: 'Play Console track (none | internal | alpha | beta | production)'
        required: false
        default: 'none'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Install JS dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/vyrlabs-release.jks
          echo "keystore sha256: $(shasum -a 256 android/app/vyrlabs-release.jks | cut -d' ' -f1)"

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_BASE64" ]; then
            echo "$GOOGLE_SERVICES_BASE64" | base64 --decode > android/app/google-services.json
          else
            echo "::warning::GOOGLE_SERVICES_BASE64 not set — using the file already committed to the repo if any"
          fi

      - name: Build release AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Build release APK (for internal sideloading)
        working-directory: android
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Locate artifacts
        id: artifacts
        run: |
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -1)
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$AAB" "$APK"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyrlabs-release-aab
          path: ${{ steps.artifacts.outputs.aab }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyrlabs-release-apk
          path: ${{ steps.artifacts.outputs.apk }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Play Console
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.upload_track != 'none'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.vyrlabs.app.android
          releaseFiles: ${{ steps.artifacts.outputs.aab }}
          track: ${{ github.event.inputs.upload_track }}
          status: completed
          changesNotSentForReview: false
